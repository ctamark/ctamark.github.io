function angleDrawImg(ctx,angle,img,x,y,width,height){

	ctx.resetTransform();

	ctx.translate(x + img.width / 2, y + img.height / 2);
	ctx.rotate((Math.PI/180) * angle);
	ctx.translate(-1 * (x + img.width / 2), -1 * (y + img.height / 2));

	ctx.drawImage(img, x , y , width , height);

	ctx.translate(x + img.width / 2, y + img.height / 2);
	ctx.rotate((Math.PI/180) * -1 * angle);
	ctx.translate(-1 * (x + img.width / 2), -1 * (y + img.height / 2));

	ctx.resetTransform();
}

function initEvent(){


   if ('ontouchstart' in document.documentElement === true){
   
   console.log("add touchEvent");
   
   canvas.addEventListener("touchstart",ts);
   canvas.addEventListener("touchmove",tm);
   canvas.addEventListener("touchend",te);
  
   }
   else {

   console.log("add mouseEvent");
  
  canvas.addEventListener("click", onClick, false);
  //------------
  canvas.addEventListener("mousedown",md);
  canvas.addEventListener("mousemove",mm);
  canvas.addEventListener("mouseup",mu); 

   }

}


function ts(e){
  
  var touches = e.touches;
  var ex = touches[0].pageX;
  var ey = touches[0].pageY - canvas.offsetTop;
  
  touchSPos[0] = ex 
  touchSPos[1] = ey   
  
  lastMovePos.x = ex 
  lastMovePos.y = ey 
  
   var msg = "touch start: (" + ex + ", " + ey + ")" 
   console.log(msg);
  
}



function tm(e){
  var touches = e.touches;
  
  let ex = touches[0].pageX 
  let ey = touches[0].pageY
  
  let deltaX = ex - lastMovePos.x 
  let deltaY = ey - lastMovePos.y
  
  lastMovePos.x = ex
  lastMovePos.y = ey
  
   var msg = "touch move.curPos: " + ex + ", " + ey 
   //console.log(msg);
   
  
    msg = "touch move:delta: " + deltaX + ", " + deltaY 
  //  console.log(msg);

   cleanerPos.y += deltaY



}
