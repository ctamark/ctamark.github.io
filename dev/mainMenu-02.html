html {

}

body {

#myCanvas {  

  /*width: 500px;
   height: 500px;
   */
    background: #BFBFBF;
    position: absolute;
    top:0;
    bottom: 0;
    left: 0;
    right: 0;
	
	z-index: 10;	
    padding: 0px;
	/*auto 남은 여백을 균등하게 배분 */

#sysMsgDiv{
  display: none;

#logoDiv {
 
    position: relative;

	height: 100%;
    text-align: center;
	/*img text는 text-align써야 함*/
    background: #888888;
	z-index: 21;

#mainMenuDiv {
    position: fixed;
    right: 0px;
    top: 0px;

    text-align: left;

#playMenuDiv {

    right: 0px;
    top: 0px;

	height: 100%;
    text-align: left;

	display: none;

	z-index: 22;
}



.mainMenuBtn {
	
	width: 50%;
    text-align: center;
   
	display: block;
	
}

.menuItem {

  color: gray;
  font-size: 1.2rem;
}

#preMenuDiv {

   position: fixed;
   right: 10px;
   top: 10px;   
   z-index: 21;
}

/*
 z-index 
 : position으로 배치된 요소들은 배치되지않은 요소들의 위에 표시

*/

#bgDiv{
/*%는 상위요소 기준으로 적용되므로 상위요소에 width등이 적용되어 있어야 함*/ 
  width: 100%;
  height: 100%;

  color: #ffffff;

   z-index: 10; 
}

#ratingDiv{

}

#playInfoDiv{

}

#playAsmrDiv{

  position: relative;

  width: 100%; 
  height: 100%;
      
  background: #888888;
  text-align: center;
  
   z-index: 20;
 
}

function fadeOut(){

        var div = document.getElementById("logoDiv");
		opacity = Number(window.getComputedStyle(div).getPropertyValue("opacity"));
		//opacity = div.style.opacity
		
		if(opacity>0){
            //Fade out 핵심 부분
			opacity = opacity-0.1;
			div.style.opacity=opacity;
		}
		else{
 
            logoDiv.style.display = 'none'

			clearInterval(interval_ID);
		}

}

function fadeIn(){

        var div = document.getElementById("mainMenuDiv");
		opacity = Number(window.getComputedStyle(div).getPropertyValue("opacity"));
		//opacity = div.style.opacity
		
		if(opacity < 1){
          
		    opacity = opacity+0.1;
			div.style.opacity=opacity;
		}
		else{
 
            //logoDiv.style.display = 'none'
			clearInterval(interval_ID);
		}

}

function onResize(){
 
    gClientWidth = document.body.clientWidth 
	gClientHeight =document.body.clientHeight

    console.log('onResize: ' + gClientWidth + ", " + gClientHeight)
    	

    let canvas = document.getElementById('myCanvas')   
    canvas.width  = gClientWidth 
    canvas.height = gClientHeight    
   
   gWaveGroup.resize(gClientWidth, gClientHeight)
}


function initEvent(canvas){

   if ('ontouchstart' in document.documentElement === true){
   
      console.log("add touchEvent");
   
      canvas.addEventListener("touchstart",touchS);
      canvas.addEventListener("touchmove",touchM);
      canvas.addEventListener("touchend",touchE);
  
     }	 
	 
	 
	 
	 document.addEventListener('postFinishJob', onPostFinishJob);

}

// playObj로부터 postFinishJob 이벤트 받은 경우  
function onPostFinishJob(e){

	gAppstate = appstate_mainmenu

    console.log('onPostFinishJob') 
	
	sound_bg.play()


}





function touchS(e){

  console.log('touchS')
  
   if(gPlayObj != undefined){

   }
   
   
}

function touchM(e){

  console.log('touchM')
   if(gPlayObj != undefined){

   }

}

//==============
//common interface
//=============
function updateFrame(){

	 let curT = new Date().getTime();
	 gAppCurT = curT 

    gCtx.clearRect(0, 0, gClientWidth, gClientHeight) 
	

   if(gAppstate == appstate_mainmenu){

	   if(gCtx != undefined){

		  gWaveGroup.draw(gCtx) 
		  		  
	   
	     gCtx.drawImage(gSun_img, 0, 0, 120, 120) 
	   
	   
	   }
	   
	   
   }
   else if( gAppstate == appstate_play){
   
		//=================    
		if(gPlayObj != undefined){
		
			gPlayObj.updateFrame(curT)
		
		 }

		//------------------	 
		if(gPlayObj != undefined && gCtx != undefined){
	   
		   gPlayObj.draw(gCtx)
		
		}
	}
	//=================
	 
   requestAnimationFrame(updateFrame);

}


window.onload = function(){

    console.log('window.onload ')
    let canvas = document.getElementById('myCanvas')   
    gCtx = canvas.getContext("2d");
   
     initEvent(canvas);
   
    gWaveGroup = new WaveGroup()
	//gWave.x = 250
	//gWave.y = 250
	
	onResize()
	

    window.addEventListener('resize', onResize, false);
	
	
	requestAnimationFrame(updateFrame);
}
