function getContactBall(probeObj){

   let refDist
   for(let i=0; i < gBalls.length; i++){
   
	   let b1 = gBalls[i]
	   if(b1 == probeObj){
			continue;
		}
    
		let diffX = probeObj.pos.x - b1.pos.x 
		let diffY = probeObj.pos.y - b1.pos.y 
		let dist = Math.sqrt(diffX*diffX + diffY*diffY)

		let normalV = {x: diffX/dist, y: diffY/dist}
		
		
		let  contactDist = probeObj.radius + b1.radius
	    refDist = probeObj.radius + b1.radius + 10
		
		let contactPos = {	
			x: b1.pos.x + normalV.x*contactDist  ,
			y: b1.pos.y + normalV.y*contactDist 				
		}
		
	
		if(dist <= refDist){
				console.log('normalV' + normalV.x + ', ' + normalV.y)

		
		     console.log('dist, refDist ' + dist +', ' + refDist)	
	        console.log('probe.contactPos ' +probeObj.pos.x +',' +probeObj.pos.y + 'refDist: ' + refDist)	
	        console.log('contactPos ' +b1.pos.x +', ' +b1.pos.y)	
	 
  		
  		   	console.log('r1->' + probeObj.radius + ', r2-> ' + b1.radius)
				
			  return {ball:b1, pos: contactPos}
		}
   
   }
   return null 
}


//ballA ---> 시작점 ball 
function probeMatchedBall(ballA){

    let matchIDArray = [] 
	
     console.log('probeMatchedBall: start_id-->' + ballA.id + 'link_id: ' + ballA.link_ball_id)
	let numMatch = 1		
	
	matchIDArray.push(ballA.id)
	
    let nextLinkBall = getBall(ballA.link_ball_id)	
   
    while(nextLinkBall != null && (nextLinkBall.rscIdx == ballA.rscIdx) ){

            matchIDArray.push(nextLinkBall.id)

    	    numMatch++
			
            console.log('ball-id--->' +  nextLinkBall.id + '-->link_id: ' + nextLinkBall.link_ball_id)
			
            nextLinkBall = getBall(nextLinkBall.link_ball_id) 
     }   
	 
	 console.log('numMatchedBall: --->' + numMatch)
	 
	 if(matchIDArray.length < 3){
	 
	      return;
	 }

	  matchIDArray.forEach(id=>{
	  
		  let ball = getBall(id)
		  		  
		  if(ball != null){
		  		  
			ball.isWaitForRemove = true 
			
			
			let effectSpr = new sprite(2000)
			effectSpr.pos = {x: ball.pos.x, y: ball.pos.y}
			
			effectSpr.msg = '+15---'
			effectSpr.isUpMove = true 
			gEffectSprites.push(effectSpr) 
			
		  }		  
	  })
	 	 
}
